{{- if not .Values.auth.existingSecret -}}
{{- if or .Values.auth.username .Values.auth.token .Values.auth.orgId -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prometheus-mcp-server.fullname" . }}-auth
  labels:
    {{- include "prometheus-mcp-server.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.auth.username }}
  PROMETHEUS_USERNAME: {{ .Values.auth.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.password }}
  PROMETHEUS_PASSWORD: {{ .Values.auth.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.token }}
  PROMETHEUS_TOKEN: {{ .Values.auth.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.orgId }}
  ORG_ID: {{ .Values.auth.orgId | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
